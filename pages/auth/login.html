<!-- 
  ================================
  LOGIN PAGE (pages/auth/login.html)
  ================================
  Purpose: User authentication entry point
  - Allows existing users to sign in with email & password
  - Forgot password recovery link
  - Sign up link for new users
  - Email validation and password field
  - Session management via login
  Target: Existing users and clients
  ================================
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login - Pial Mahmud Portfolio" />
    <meta name="author" content="Pial Mahmud" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/09b5120dfd.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login - Pial Mahmud</title>
    <style>
      * {
        font-family: "Poppins", sans-serif;
      }
      body {
        background: linear-gradient(
          135deg,
          #0a0e27 0%,
          #1a1a3e 25%,
          #0d1a3a 50%,
          #1a0a2e 75%,
          #0f0a1f 100%
        );
        min-height: 100vh;
      }
      .gradient-text {
        background: linear-gradient(
          135deg,
          #06b6d4 0%,
          #8b5cf6 50%,
          #ec4899 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .glow-effect {
        box-shadow:
          0 0 35px rgba(139, 92, 246, 0.4),
          0 0 60px rgba(236, 72, 153, 0.2);
      }
      .glass-effect {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(139, 92, 246, 0.2);
      }
    </style>
  </head>
  <body>
    <!-- 
    ========== LOGIN PAGE CONTAINER ==========
    Purpose: Full-screen centered authentication form
    - Centered layout focuses user attention on login form
    - Full-height container ensures form appears in center of viewport
    - Dark background maintains brand aesthetic
    ==========================================
    -->
    <div class="min-h-screen flex items-center justify-center px-4">
      <div class="w-full max-w-md">
        <!-- 
        ========== BRAND HEADER SECTION ==========
        Purpose: Remind user they're logging into trusted portfolio site
        - Logo (PM initials) creates brand recognition
        - Developer name and title reinforce professionalism
        - Link back to home for easy navigation
        - Gradient styling matches main portfolio aesthetic
        ===========================================
        -->
        <!-- Logo -->
        <div class="text-center mb-8">
          <a
            href="../../index.html"
            class="inline-flex items-center gap-3 hover:opacity-80 transition"
          >
            <div
              class="w-14 h-14 rounded-full bg-gradient-to-br from-violet-500 via-purple-500 to-pink-500 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-purple-500/50"
            >
              PM
            </div>
            <div>
              <h1 class="text-2xl font-bold gradient-text">Pial Mahmud</h1>
              <p class="text-xs text-gray-400">Full Stack Developer</p>
            </div>
          </a>
        </div>

        <!-- Login Card -->
        <!-- 
        ========== LOGIN FORM SECTION ==========
        Purpose: Collect user credentials securely
        - "Welcome Back" message creates personal connection
        - Email field: Identifier for user account lookup
        - Password field: Secret authentication credential
        - "Remember me" checkbox: Convenience for returning users
        - "Forgot Password?" link: Password recovery option
        - "Sign In" button: Primary action to authenticate
        =========================================
        -->
        <div
          class="bg-gradient-to-br from-purple-500/10 to-pink-500/10 border border-purple-500/30 rounded-2xl p-8 backdrop-blur-sm"
        >
          <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
          <p class="text-gray-400 mb-8">Sign in to your account to continue</p>

          <form id="loginForm" class="space-y-4 sm:space-y-6">
            <!-- 
            ========== EMAIL INPUT FIELD ==========
            Purpose: Collect user email for account identification
            - Email format validation ensures valid email address
            - Required field prevents empty submissions
            - Placeholder gives user hint what to enter
            - Purple styling matches brand color scheme
            ========================================
            -->
            <!-- Email -->
            <div>
              <label
                for="email"
                class="block text-xs sm:text-sm font-semibold text-purple-300 mb-2"
                >Email Address</label
              >
              <input
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                class="w-full px-3 sm:px-4 py-2 sm:py-3 bg-slate-900/50 border-2 border-purple-500/30 text-gray-100 text-sm sm:text-base rounded-xl focus:border-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-500/20 transition"
                required
              />
            </div>

            <!-- 
            ========== PASSWORD INPUT FIELD ==========
            Purpose: Collect secret credential for authentication
            - Password type hides characters for security
            - Required field prevents empty submissions
            - Validation enforces minimum security requirements
            - Shows/hide toggle allows user to verify their typing
            ==============================================
            -->
            <!-- Password -->
            <div>
              <label
                for="password"
                class="block text-xs sm:text-sm font-semibold text-purple-300 mb-2"
                >Password</label
              >
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                class="w-full px-3 sm:px-4 py-2 sm:py-3 bg-slate-900/50 border-2 border-purple-500/30 text-gray-100 text-sm sm:text-base rounded-xl focus:border-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-500/20 transition"
                required
              />
            </div>

            <!-- 
            ========== REMEMBER ME & FORGOT PASSWORD ==========
            Purpose: Enhance user convenience and security recovery
            - "Remember me" checkbox stores credentials for faster login on trusted devices
            - "Forgot password?" link redirects to password recovery flow
            - Located below credentials but before submit for logical flow
            - Helps reduce friction for returning users while protecting security
            ====================================================
            -->
            <!-- Remember & Forgot Password -->
            <div class="flex items-center justify-between text-xs sm:text-sm">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="w-4 h-4 accent-purple-600" />
                <span class="text-gray-400">Remember me</span>
              </label>
              <a
                href="forgot-password.html"
                class="text-purple-400 hover:text-purple-300 transition"
                >Forgot password?</a
              >
            </div>

            <!-- 
            ========== SIGN IN BUTTON ==========
            Purpose: Primary call-to-action for form submission
            - Form validation triggers on click
            - Gradient styling draws attention (purple to pink)
            - Hover effects signal interactivity to user
            - Glow effect adds modern aesthetic appeal
            - Full-width button makes touch target large (mobile friendly)
            ====================================
            -->
            <!-- Login Button -->
            <button
              type="submit"
              class="w-full py-2.5 sm:py-3 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white text-sm sm:text-base rounded-xl font-semibold transition-all duration-300 hover:glow-effect shadow-lg"
            >
              Sign In
            </button>
          </form>

          <!-- Divider -->
          <div class="relative my-6 sm:my-8">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-purple-500/20"></div>
            </div>
            <div class="relative flex justify-center text-xs sm:text-sm">
              <span class="px-2 bg-slate-900/80 text-gray-400"
                >Or continue with</span
              >
            </div>
          </div>

          <!-- Social Login -->
          <div class="grid grid-cols-3 gap-3">
            <button
              class="py-2.5 border-2 border-purple-500/30 hover:border-purple-500/60 hover:bg-purple-500/10 rounded-xl text-gray-400 hover:text-purple-400 transition"
              title="Google"
            >
              <i class="fab fa-google text-base sm:text-lg"></i>
            </button>
            <button
              class="py-2.5 border-2 border-purple-500/30 hover:border-purple-500/60 hover:bg-purple-500/10 rounded-xl text-gray-400 hover:text-purple-400 transition"
              title="GitHub"
            >
              <i class="fab fa-github text-base sm:text-lg"></i>
            </button>
            <button
              class="py-2.5 border-2 border-purple-500/30 hover:border-purple-500/60 hover:bg-purple-500/10 rounded-xl text-gray-400 hover:text-purple-400 transition"
              title="LinkedIn"
            >
              <i class="fab fa-linkedin text-base sm:text-lg"></i>
            </button>
          </div>

          <!-- 
          ========== SIGN UP LINK SECTION ==========
          Purpose: Redirect new users to registration page
          - "Don't have an account?" text explains the link purpose
          - "Sign up" link directs potential new users to registration
          - Increases user acquisition by capturing interested new visitors
          - Important for growth and expanding user base
          ===========================================
          -->
          <!-- Sign Up Link -->
          <p
            class="text-center text-gray-400 mt-6 sm:mt-8 text-sm sm:text-base"
          >
            Don't have an account?
            <a
              href="register.html"
              class="text-purple-400 hover:text-purple-300 font-semibold transition"
              >Sign up</a
            >
          </p>
        </div>

        <!-- 
        ========== FOOTER NAVIGATION SECTION ==========
        Purpose: Additional navigation options for users
        - "Back to Home" link redirects to main portfolio page
        - Copyright notice establishes ownership and legal information
        - Subtle footer design keeps focus on login form
        ===============================================
        -->
        <!-- Footer Links -->
        <div class="mt-6 sm:mt-8 text-center space-y-2">
          <a
            href="../../index.html"
            class="text-gray-600 hover:text-gray-400 text-xs sm:text-sm transition block"
            >Back to Home</a
          >
          <p class="text-gray-700 text-xs">
            © 2024 Pial Mahmud. All rights reserved.
          </p>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("loginForm")?.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        // Show feedback
        alert(
          `Login attempt:\nEmail: ${email}\nPassword: ${password}\n\nThis is a demo. Connect to your backend API.`,
        );

        // Here you would typically send to your backend
        console.log("Login attempt:", { email, password });
      });
    </script>
  </body>
</html>
