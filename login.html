<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login - Pial Mahmud Portfolio" />
  <meta name="author" content="Pial Mahmud" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/09b5120dfd.js" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Login - Pial Mahmud</title>
  <style>
    * { font-family: 'Poppins', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1a1a2e 50%, #16213e 100%); min-height: 100vh; }
    .gradient-text { background: linear-gradient(135deg, #60a5fa 0%, #818cf8 50%, #a78bfa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .glow-effect { box-shadow: 0 0 30px rgba(96, 165, 250, 0.3); }
  </style>
</head>
<body>
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8">
        <a href="index.html" class="inline-flex items-center gap-3 hover:opacity-80 transition">
          <div class="w-14 h-14 rounded-full bg-gradient-to-br from-blue-400 to-indigo-600 flex items-center justify-center text-white font-bold text-xl">PM</div>
          <div>
            <h1 class="text-2xl font-bold gradient-text">Pial Mahmud</h1>
            <p class="text-xs text-gray-400">Full Stack Developer</p>
          </div>
        </a>
      </div>

      <!-- Login Card -->
      <div class="bg-gradient-to-br from-blue-500/10 to-indigo-500/10 border border-blue-500/30 rounded-2xl p-8 backdrop-blur-sm">
        <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
        <p class="text-gray-400 mb-8">Sign in to your account to continue</p>

        <form id="loginForm" class="space-y-6">
          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-semibold text-blue-300 mb-2">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email"
              placeholder="you@example.com"
              class="w-full px-4 py-3 bg-slate-900/50 border-2 border-blue-500/30 text-gray-100 rounded-lg focus:border-blue-500 focus:outline-none transition"
              required
            />
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-semibold text-blue-300 mb-2">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password"
              placeholder="••••••••"
              class="w-full px-4 py-3 bg-slate-900/50 border-2 border-blue-500/30 text-gray-100 rounded-lg focus:border-blue-500 focus:outline-none transition"
              required
            />
          </div>

          <!-- Remember & Forgot Password -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="w-4 h-4 accent-blue-600" />
              <span class="text-sm text-gray-400">Remember me</span>
            </label>
            <a href="forgot-password.html" class="text-sm text-blue-400 hover:text-blue-300 transition">Forgot password?</a>
          </div>

          <!-- Login Button -->
          <button 
            type="submit" 
            class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-lg font-semibold transition-all duration-300 hover:glow-effect"
          >
            Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-blue-500/30"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-gradient-to-br from-blue-500/10 to-indigo-500/10 text-gray-400">Or continue with</span>
          </div>
        </div>

        <!-- Social Login -->
        <div class="grid grid-cols-3 gap-4">
          <button class="py-2 border-2 border-blue-500/30 hover:border-blue-500/60 rounded-lg text-gray-400 hover:text-blue-400 transition" title="Google">
            <i class="fab fa-google text-lg"></i>
          </button>
          <button class="py-2 border-2 border-blue-500/30 hover:border-blue-500/60 rounded-lg text-gray-400 hover:text-blue-400 transition" title="GitHub">
            <i class="fab fa-github text-lg"></i>
          </button>
          <button class="py-2 border-2 border-blue-500/30 hover:border-blue-500/60 rounded-lg text-gray-400 hover:text-blue-400 transition" title="LinkedIn">
            <i class="fab fa-linkedin text-lg"></i>
          </button>
        </div>

        <!-- Sign Up Link -->
        <p class="text-center text-gray-400 mt-6">
          Don't have an account? 
          <a href="register.html" class="text-blue-400 hover:text-blue-300 font-semibold transition">Sign up</a>
        </p>
      </div>

      <!-- Footer Links -->
      <div class="mt-8 text-center space-y-2">
        <a href="index.html" class="text-gray-600 hover:text-gray-400 text-sm transition">Back to Home</a>
        <p class="text-gray-700 text-xs">© 2024 Pial Mahmud. All rights reserved.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm')?.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Show feedback
      alert(`Login attempt:\nEmail: ${email}\nPassword: ${password}\n\nThis is a demo. Connect to your backend API.`);
      
      // Here you would typically send to your backend
      console.log('Login attempt:', { email, password });
    });
  </script>
</body>
</html>
